name: My first pipeline
on:
    push: 
        branches: [main]



jobs: 
    build:
        runs-on: ubuntu-latest # macos, windows-latest
        steps:
            - name: clone the code
              uses: actions/checkout@v4
            - name: Build image
              run:
                docker build -t bkarasa/cicd-portfolio .
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: bkarasa
                password: $ {{ secret.DOCKERPASSWORD }}  
            - name: push image
              run:
                docker push bkarasa/cicd-portfolio

        