name: Build and push to ECR

on:
    push:
       # pull requests:
       #     branches:['main', 'dev']
        branches: [ 'main']


jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout the code
              uses: actions/checkout@v7
            - name: Trivy Scan
              uses:   aquasecurity/trivy-action@v0.36.0
              with: 
                scan-type: 'fs'
                severity: HIGH,CRITICAL
                exit-code: 0
            - name: Build Docker Image   
              run: docker build -t 981974821555.dkr.ecr.us-east-1.amazonaws.com/my-repos:latest . 
            - name: Scan Image with Trivy
              uses: aquasecurity/trivy-action@v0.36.0
              with:

                image-ref: 981974821555.dkr.ecr.us-east-1.amazonaws.com/my-repos:latest
                format: table
                exit-code: 0
                ignore-unfixed: true
                severity: HIGH,CRITICAL
            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
                with:
                  role-to-assume: arn:aws:iam::981974821555:role/Github_action_role
                  aws-region: us-east-1
            -   name: Login to Amazon ECR
                id: login-ecr
                uses: aws-actions/amazon-ecr-login@v2
                
